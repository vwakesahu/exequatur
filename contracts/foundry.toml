[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.23"
evm_version = "london"
optimizer = true
optimizer_runs = 200
auto_detect_solc = false
fs_permissions = [{ access = "read", path = "./out" }]

[fmt]
line_length = 120
tab_width = 4
quote_style = "double"
number_underscore = "preserve"
